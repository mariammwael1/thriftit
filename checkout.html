<div class="container mt-5 pt-5">

  <h2 class="fw-bold text-white">Checkout</h2>

  <!-- CART -->
  <div class="table-responsive mt-4">
    <table class="table table-dark table-striped align-middle">
      <thead>
        <tr>
          <th>Product</th>
          <th>Color</th>
          <th>Size</th>
          <th>Price</th>
        </tr>
      </thead>
      <tbody id="checkout-body"></tbody>
    </table>
  </div>

  <!-- GRAND TOTAL -->
  <div class="text-end mt-3">
    <h3 class="fw-bold text-white">
      Grand Total:
      <span id="checkout-grand-total" class="fs-2 fw-bolder text-white"></span>
    </h3>
  </div>

  <!-- DELIVERY -->
  <h3 class="mt-4 fw-bold text-white">Delivery Details</h3>

  <form id="checkout-form">

    <div class="mb-2">
      <input class="form-control" id="street" placeholder="Street" required>
    </div>

    <div class="mb-2">
      <input class="form-control" id="apartment" placeholder="Apartment / Floor" required>
    </div>

    <div class="mb-2">
      <input class="form-control" id="region" placeholder="Region" required>
    </div>

    <div class="mb-3">
      <input class="form-control" id="city" placeholder="City" required>
    </div>

    <!-- PHONE -->
    <div class="mb-3">
      <input
        type="text"
        class="form-control"
        id="phone"
        placeholder="01XXXXXXXXX"
        inputmode="numeric"
        maxlength="11"
        required
        oninput="this.value=this.value.replace(/[^0-9]/g,'').slice(0,11)"
      >
    </div>

    <!-- PAYMENT -->
    <div class="mb-3 text-white">
      <label class="fw-bold">Payment Method</label><br>
      <input type="radio" name="payment" value="cod" checked> Cash on Delivery<br>
      <input type="radio" name="payment" value="visa"> Visa
    </div>

    <!-- VISA -->
    <div id="card-details" class="d-none">
      <input class="form-control mb-2" placeholder="Card Number">
      <input class="form-control mb-2" placeholder="Expiry">
      <input class="form-control mb-2" placeholder="CVV">
    </div>

    <button class="btn btn-success w-100 mt-3 fw-bold">
      Confirm Purchase
    </button>

  </form>
</div>

<script>

// =====================
// CHECK LOGIN (IMPORTANT)
// =====================
let currentUser = JSON.parse(localStorage.getItem("currentUser"));

if (!currentUser) {
  alert("Please login first ❌");
  window.location.href = "login.html";
}

// =====================
// LOAD CART
// =====================
function loadCheckout() {

  let allCarts = JSON.parse(localStorage.getItem("carts")) || {};
  let cart = allCarts[currentUser.email] || [];

  const body = document.getElementById("checkout-body");
  body.innerHTML = "";

  let total = 0;

  if (cart.length === 0) {
    body.innerHTML = `
      <tr>
        <td colspan="4" class="text-center text-white py-4">
          Your cart is empty 🛒
        </td>
      </tr>
    `;
    document.getElementById("checkout-grand-total").innerText = "";
    return;
  }

  cart.forEach(product => {

    let price = parseFloat(product.price) || 0;
    total += price;

    body.innerHTML += `
      <tr class="text-white">
        <td>
          <img src="${product.image}" width="50" class="me-2">
          ${product.name}
        </td>
        <td>${product.color || "-"}</td>
        <td>${product.size || "-"}</td>
        <td>${price} EGP</td>
      </tr>
    `;
  });

  document.getElementById("checkout-grand-total").innerText = total + " EGP";
}

loadCheckout();


// =====================
// PAYMENT TOGGLE FIX
// =====================
document.querySelectorAll('input[name="payment"]').forEach(radio => {
  radio.addEventListener("change", (e) => {
    document.getElementById("card-details").classList.toggle("d-none", e.target.value !== "visa");
  });
});


// =====================
// SUBMIT ORDER
// =====================
document.getElementById("checkout-form").addEventListener("submit", (e) => {
  e.preventDefault();

  let allCarts = JSON.parse(localStorage.getItem("carts")) || {};

  let cart = allCarts[currentUser.email] || [];

  if (cart.length === 0) {
    alert("Cart is empty ❌");
    return;
  }

  alert("Order placed successfully 🎉");

  // clear cart
  allCarts[currentUser.email] = [];
  localStorage.setItem("carts", JSON.stringify(allCarts));

  window.location.href = "index.html";
});

</script>

</body>
