<div class="container mt-5 pt-5">
  <h2>Your Cart</h2>

  <div class="table-responsive">
    <table class="table table-dark table-striped mt-3">
      <thead>
        <tr>
          <th>Product</th>
          <th>Color</th>
          <th>Size</th>
          <th>Price</th>
          <th>Action</th>
        </tr>
      </thead>

      <tbody id="cart-body"></tbody>
    </table>
  </div>

  <h4 class="text-end">
    Grand Total: <span id="grand-total">0</span> EGP
  </h4>

  <div class="text-end mt-3">
    <button id="checkout-btn" class="btn btn-success btn-lg">
      Checkout
    </button>
  </div>
</div>































<script>
// =====================
// CHECK LOGIN (IMPORTANT)
// =====================
let currentUser = JSON.parse(localStorage.getItem("currentUser"));

if (!currentUser) {
  alert("Please login first ❌");
  window.location.href = "login.html";
}

// =====================
// LOAD CART
// =====================
function loadCart() {

  let allCarts = JSON.parse(localStorage.getItem("carts")) || {};
  let userCart = allCarts[currentUser.email] || [];

  const tbody = document.getElementById("cart-body");
  const grandTotal = document.getElementById("grand-total");

  tbody.innerHTML = "";
  let total = 0;

  // EMPTY CART
  if (userCart.length === 0) {
    tbody.innerHTML = `
      <tr>
        <td colspan="6" class="text-center py-5 text-muted">
          Your cart is empty 🛒
        </td>
      </tr>
    `;
    grandTotal.innerText = 0;
    return;
  }

  // RENDER ITEMS
  userCart.forEach((item, index) => {

    let price = parseFloat(item.price) || 0;
    total += price;

    let row = `
      <tr>
        <td><img src="${item.image}" width="60"></td>
        <td>${item.name}</td>
        <td>${item.color || "-"}</td>
        <td>${item.size || "-"}</td>
        <td>${price} EGP</td>
        <td>
          <button class="btn btn-danger btn-sm" onclick="removeItem(${index})">
            Remove
          </button>
        </td>
      </tr>
    `;

    tbody.innerHTML += row;
  });

  grandTotal.innerText = total;
}

// =====================
// REMOVE ITEM
// =====================
function removeItem(index) {

  if (!currentUser) return;

  let allCarts = JSON.parse(localStorage.getItem("carts")) || {};
  let userCart = allCarts[currentUser.email] || [];

  userCart.splice(index, 1);

  allCarts[currentUser.email] = userCart;

  localStorage.setItem("carts", JSON.stringify(allCarts));

  loadCart();
}

// =====================
// CHECKOUT BUTTON
// =====================
document.getElementById("checkout-btn")?.addEventListener("click", function () {

  if (!currentUser) {
    alert("Please login first ❌");
    window.location.href = "login.html";
    return;
  }

  let allCarts = JSON.parse(localStorage.getItem("carts")) || {};
  let userCart = allCarts[currentUser.email] || [];

  if (userCart.length === 0) {
    alert("Your cart is empty 🛒");
    return;
  }

  window.location.href = "checkout.html";
});

// =====================
// INIT
// =====================
loadCart();

</script>
