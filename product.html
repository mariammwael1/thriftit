<script>
const urlParams = new URLSearchParams(window.location.search);
const productId = urlParams.get('id');

let products = JSON.parse(localStorage.getItem('products')) || [];
let product = products.find(p => p.id == productId);

// =====================
// LOAD PRODUCT DATA
// =====================
if (product) {
  document.getElementById('product-name').textContent = product.name;
  document.getElementById('product-price').textContent = `Price: ${product.price} EGP`;
  document.getElementById('product-color').textContent = `Color: ${product.color}`;
  document.getElementById('product-size').textContent = `Size: ${product.size}`;
  document.getElementById('product-onepiece').textContent = `Condition: ${product.condition || "Good"}`;

  const carouselInner = document.getElementById('carousel-inner');

  product.images.forEach((img, i) => {
    const div = document.createElement('div');
    div.className = `carousel-item ${i === 0 ? 'active' : ''}`;
    div.innerHTML = `<img src="${img}" class="d-block w-100">`;
    carouselInner.appendChild(div);
  });
}

// =====================
// ADD TO CART (FIXED SYSTEM)
// =====================
function addToCart(product) {

  let currentUser = JSON.parse(localStorage.getItem("currentUser"));

  if (!currentUser || !currentUser.email) {
    alert("Please login first");
    return;
  }

  let allCarts = JSON.parse(localStorage.getItem("carts")) || {};

  let userCart = allCarts[currentUser.email] || [];

  // prevent duplicates
  let exists = userCart.find(p => p.id == productId);

  if (!exists) {
    userCart.push({
      id: productId,
      name: product.name,
      price: product.price,
      image: product.images[0],
      color: product.color,
      size: product.size
    });

    allCarts[currentUser.email] = userCart;

    localStorage.setItem("carts", JSON.stringify(allCarts));

    alert("Added to cart 🛒");
  } else {
    alert("Already in cart");
  }
}

// =====================
// BUTTONS
// =====================
const addBtn = document.getElementById('add-to-cart');
const buyBtn = document.getElementById('buy-it-now');

addBtn?.addEventListener('click', () => {
  addToCart(product);
});

buyBtn?.addEventListener('click', () => {
  addToCart(product);
  window.location.href = "cart.html";
});
</script>
