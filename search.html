<script>
let currentUser = JSON.parse(localStorage.getItem("currentUser"));

let loginBtn = document.getElementById("loginBtn");
let signupBtn = document.getElementById("signupBtn");
let logoutBtn = document.getElementById("logoutBtn");
let username = document.getElementById("username");

function logout() {
  localStorage.removeItem("currentUser");
  window.location.href = "login.html";
}

if (currentUser) {
  loginBtn.style.display = "none";
  signupBtn.style.display = "none";

  logoutBtn.style.display = "inline-block";

  username.style.display = "inline-block";
  username.innerText = "Hi, " + currentUser.name;
} else {
  loginBtn.style.display = "inline-block";
  signupBtn.style.display = "inline-block";

  logoutBtn.style.display = "none";
  username.style.display = "none";
}
</script>


<!-- نفس layout بتاع women -->
<div class="container mt-0 pt-3">
  <div class="row" id="results"></div>
</div>

<script>
function goToSearch(e){
  e.preventDefault();
  const val = document.getElementById("searchInput").value;
  window.location.href = "search.html?query=" + val;
}

const params = new URLSearchParams(window.location.search);
const query = params.get("query")?.toLowerCase() || "";

const products = JSON.parse(localStorage.getItem("products")) || [];
const container = document.getElementById("results");

// لو مفيش results
let found = false;

products.forEach((product, index) => {

  let name = product.name?.toLowerCase() || "";
  let category = product.category?.toLowerCase() || "";

  if (
    product.status === "approved" &&
    (
      query === "" ||
      name.includes(query) ||
      category.includes(query)
    )
  ) {

    found = true;

    let carouselId = `search-carousel-${index}`;

    let carouselInner = product.images.map((img, i) => `
      <div class="carousel-item ${i === 0 ? 'active' : ''}">
        <img src="${img}" class="d-block w-100" alt="${product.name}">
      </div>
    `).join('');

    let card = document.createElement("div");
    card.className = "col-12 col-sm-6 col-md-6 col-lg-3 mb-4";

    card.innerHTML = `
      <div class="card">

        <div id="${carouselId}" class="carousel slide" data-bs-interval="false">
          <div class="carousel-inner">
            ${carouselInner}
          </div>

          <button class="carousel-control-prev" type="button" data-bs-target="#${carouselId}" data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
          </button>

          <button class="carousel-control-next" type="button" data-bs-target="#${carouselId}" data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
          </button>
        </div>

        <div class="card-body">

          <span class="badge bg-dark mb-2">${product.category}</span>

          <h5 class="fw-bold">${product.name}</h5>

          <p class="text-muted">${product.price} EGP</p>

          <p>Color: ${product.color}</p>
          <p>Size: ${product.size}</p>

          <a href="product.html?id=${product.id}" class="btn btn-dark w-100">
            View Product
          </a>

        </div>
      </div>
    `;

    container.appendChild(card);
  }
});

// لو مفيش أي نتيجة
if (!found) {
  container.innerHTML = `
    <div class="d-flex flex-column justify-content-center align-items-center text-white mt-5" style="min-height:300px;">

      <div style="font-size:60px;">🛍️</div>

      <h3 class="mt-3 fw-bold">No results found</h3>

      <p class="text-light opacity-75">
        Try searching with different keywords
      </p>

      <a href="index.html" class="btn btn-light mt-2">
        Back to Home
      </a>

    </div>
  `;
}
</script>

<script src="script/bootstrap.min.js"></script>

</body>
