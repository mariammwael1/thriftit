<!-- Pending Products Section -->
<div class="container mt-5 pt-5">
  <h2 class="mb-2 d-inline-block">Pending Products</h2>
  <button id="deleteApprovedBtn" class="btn btn-dark ms-3 mb-4">Delete All Approved Products</button>

  <div id="pendingProducts" class="row"></div>
</div>

<script>
const pendingContainer = document.getElementById('pendingProducts');

// Load pending products
function loadPendingProducts() {
  pendingContainer.innerHTML = "";
  const products = JSON.parse(localStorage.getItem('products')) || [];
  const pendingProducts = products.filter(p => p.status === "pending");

  if(pendingProducts.length === 0){
    pendingContainer.innerHTML = "<p class='text-muted'>No pending products.</p>";
    return;
  }

  pendingProducts.forEach(product => {
    const col = document.createElement('div');
    col.className = "col-md-4 mb-4";
    col.innerHTML = `
      <div class="card">
        <div id="carousel-${product.id}" class="carousel slide" data-bs-interval="false">
          <div class="carousel-inner">
            ${product.images.map((img, index) => `
              <div class="carousel-item ${index === 0 ? 'active' : ''}">
                <img src="${img}" class="d-block w-100">
              </div>
            `).join('')}
          </div>
          <button class="carousel-control-prev" type="button" data-bs-target="#carousel-${product.id}" data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
          </button>
          <button class="carousel-control-next" type="button" data-bs-target="#carousel-${product.id}" data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
          </button>
        </div>
        <div class="card-body">
          <h5>${product.name}</h5>
          <p>${product.price} EGP</p>
          <p>Color: ${product.color}</p>
          <p>Size: ${product.size}</p>
          <p>Condition: ${product.condition}</p>
          <p>Email: ${product.email}</p>
          <button class="btn btn-success me-2 approve-btn">Approve</button>
          <button class="btn btn-danger reject-btn">Reject</button>
        </div>
      </div>
    `;
    pendingContainer.appendChild(col);

    // Button Events
    col.querySelector(".approve-btn").addEventListener("click", () => handleAction(product.id, "approved"));
    col.querySelector(".reject-btn").addEventListener("click", () => handleAction(product.id, "rejected"));
  });
}

// Handle approve/reject/delete actions
function handleAction(productId, action) {
  const products = JSON.parse(localStorage.getItem('products')) || [];
  const index = products.findIndex(p => p.id === productId);

  if(index !== -1){
    if(action === "approved") {
      products[index].status = "approved";
    } else {
      products.splice(index,1); // حذف المنتج لو تم رفضه
    }
    localStorage.setItem('products', JSON.stringify(products));
    loadPendingProducts();
  }
}

// Delete all approved products
document.getElementById("deleteApprovedBtn").addEventListener("click", () => {
  let products = JSON.parse(localStorage.getItem("products")) || [];
  products = products.filter(p => p.status !== "approved");
  localStorage.setItem("products", JSON.stringify(products));
  alert("All approved products have been deleted!");
  loadPendingProducts();
});

// Initial load
loadPendingProducts();
</script>
